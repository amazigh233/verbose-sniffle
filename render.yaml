services:
  - type: web
    name: climature-bedrijfsportaal
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm ci && npm run prisma:generate
    startCommand: npm run start:render
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 24.18.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: climature-bedrijfsportaal-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: climature
      - key: ADMIN_PASSWORD_HASH
        sync: false

databases:
  - name: climature-bedrijfsportaal-db
    plan: free
    region: frankfurt
    databaseName: climature
    user: climature
